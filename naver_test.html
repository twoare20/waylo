<!DOCTYPE html>
<html>
<head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
</head>
<body>
<p id="msg">로딩중...</p>
<div id="map" style="width:100%;height:400px"></div>
<script>
function initMap(){
  document.getElementById('msg').textContent='✅ 네이버지도 로드 성공!';
  document.getElementById('msg').style.color='green';
  var map = new naver.maps.Map('map', {
    center: new naver.maps.LatLng(33.45, 126.57),
    zoom: 10
  });
}
</script>
<script src="https://oapi.map.naver.com/openapi/v3/maps.js?ncpClientId=aeuph3gsg5&callback=initMap"
  onerror="document.getElementById('msg').textContent='❌ 로드 실패';document.getElementById('msg').style.color='red'">
</script>
</body>
</html>
