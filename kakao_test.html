<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body>
<div id="map" style="width:100%;height:400px"></div>
<script>
window.onload = function() {
  document.body.innerHTML += '<p>카카오 로드 시도 중...</p>';
}
</script>
<script type="text/javascript" 
  src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=8e193480c149cd1bd087f8836d2a4859"
  onload="document.body.innerHTML += '<p style=color:green>✅ 카카오맵 로드 성공!</p>'; new kakao.maps.Map(document.getElementById('map'), {center: new kakao.maps.LatLng(33.45, 126.57), level: 3});"
  onerror="document.body.innerHTML += '<p style=color:red>❌ 카카오맵 로드 실패</p>'">
</script>
</body>
</html>
